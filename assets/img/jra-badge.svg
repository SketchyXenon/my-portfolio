<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>

    <!-- Background gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0a14"/>
      <stop offset="100%" stop-color="#080810"/>
    </linearGradient>

    <!-- Accent glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Soft outer glow for the ring -->
    <filter id="ring-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Corner clip -->
    <clipPath id="hex-clip">
      <polygon points="250,30 450,140 450,360 250,470 50,360 50,140"/>
    </clipPath>

  </defs>

  <!-- ── Background ── -->
  <rect width="500" height="500" fill="url(#bg-grad)"/>

  <!-- ── Subtle grid texture ── -->
  <g opacity="0.06" stroke="#00ffc8" stroke-width="0.5">
    <line x1="0"   y1="100" x2="500" y2="100"/>
    <line x1="0"   y1="200" x2="500" y2="200"/>
    <line x1="0"   y1="300" x2="500" y2="300"/>
    <line x1="0"   y1="400" x2="500" y2="400"/>
    <line x1="100" y1="0"   x2="100" y2="500"/>
    <line x1="200" y1="0"   x2="200" y2="500"/>
    <line x1="300" y1="0"   x2="300" y2="500"/>
    <line x1="400" y1="0"   x2="400" y2="500"/>
  </g>

  <!-- ── Outer hex ring (dim) ── -->
  <polygon
    points="250,22 458,136 458,364 250,478 42,364 42,136"
    fill="none"
    stroke="#1a1a2e"
    stroke-width="1.5"
  />

  <!-- ── Middle hex ring (accent, glowing) ── -->
  <polygon
    points="250,48 432,152 432,348 250,452 68,348 68,152"
    fill="none"
    stroke="#00ffc8"
    stroke-width="1.5"
    opacity="0.5"
    filter="url(#ring-glow)"
  />

  <!-- ── Inner hex ring ── -->
  <polygon
    points="250,78 408,170 408,330 250,422 92,330 92,170"
    fill="none"
    stroke="#252538"
    stroke-width="1"
  />

  <!-- ── Corner tick marks on outer hex ── -->
  <g stroke="#00ffc8" stroke-width="2" opacity="0.8" filter="url(#glow)">
    <!-- top -->
    <line x1="250" y1="22"  x2="250" y2="48"/>
    <!-- bottom -->
    <line x1="250" y1="452" x2="250" y2="478"/>
    <!-- top-right -->
    <line x1="428" y1="130" x2="411" y2="140"/>
    <!-- bottom-right -->
    <line x1="428" y1="370" x2="411" y2="360"/>
    <!-- top-left -->
    <line x1="72"  y1="130" x2="89"  y2="140"/>
    <!-- bottom-left -->
    <line x1="72"  y1="370" x2="89"  y2="360"/>
  </g>

  <!-- ── Small corner diamonds ── -->
  <g fill="#00ffc8" opacity="0.9" filter="url(#glow)">
    <polygon points="250,16  256,22  250,28  244,22"/>
    <polygon points="250,472 256,478 250,484 244,478"/>
    <polygon points="42,130  48,136  42,142  36,136"/>
    <polygon points="458,130 464,136 458,142 452,136"/>
    <polygon points="42,364  48,370  42,376  36,370"/>
    <polygon points="458,364 464,370 458,376 452,370"/>
  </g>

  <!-- ── Inner hex fill (very subtle) ── -->
  <polygon
    points="250,88 400,176 400,324 250,412 100,324 100,176"
    fill="#0d0d1a"
  />

  <!-- ── Diagonal cross-lines (geometric detail) ── -->
  <g stroke="#1e1e30" stroke-width="1" opacity="0.6">
    <line x1="140" y1="140" x2="360" y2="360"/>
    <line x1="360" y1="140" x2="140" y2="360"/>
  </g>

  <!-- ── Center circle ── -->
  <circle cx="250" cy="250" r="108" fill="#0a0a14" stroke="#252538" stroke-width="1"/>
  <circle cx="250" cy="250" r="104" fill="none"    stroke="#00ffc8"  stroke-width="0.75" opacity="0.3"/>

  <!-- ── JRA Monogram ── -->
  <!--
    Drawn as pure SVG paths — geometric, pixel-grid-aligned.
    Each letter is 38px wide, spaced 12px apart.
    Total group width: 38+12+38+12+38 = 138px, centered at x=250
    Group starts at x = 250 - 69 = 181
  -->
  <g fill="#00ffc8" filter="url(#glow)">

    <!-- J  (x: 181–219) -->
    <!-- Top horizontal bar -->
    <rect x="181" y="214" width="38" height="6" rx="1"/>
    <!-- Vertical stem (right side) -->
    <rect x="207" y="214" width="6"  height="52" rx="1"/>
    <!-- Bottom curve suggestion — short left foot -->
    <rect x="181" y="260" width="26" height="6" rx="1"/>
    <!-- Left upward serif of J bottom -->
    <rect x="181" y="248" width="6"  height="18" rx="1"/>

    <!-- R  (x: 231–269) -->
    <!-- Vertical stem -->
    <rect x="231" y="214" width="6"  height="58" rx="1"/>
    <!-- Top horizontal -->
    <rect x="231" y="214" width="32" height="6" rx="1"/>
    <!-- Mid horizontal -->
    <rect x="231" y="237" width="28" height="6" rx="1"/>
    <!-- Top-right vertical -->
    <rect x="257" y="214" width="6"  height="29" rx="1"/>
    <!-- Diagonal leg (two segments approximation) -->
    <rect x="245" y="240" width="6"  height="14" rx="1" transform="rotate(35 248 247)"/>
    <rect x="254" y="254" width="6"  height="18" rx="1" transform="rotate(20 257 263)"/>

    <!-- A  (x: 281–319) -->
    <!-- Left diagonal -->
    <rect x="281" y="214" width="6"  height="58" rx="1" transform="rotate(16 284 243)"/>
    <!-- Right diagonal -->
    <rect x="313" y="214" width="6"  height="58" rx="1" transform="rotate(-16 316 243)"/>
    <!-- Mid crossbar -->
    <rect x="284" y="240" width="32" height="6" rx="1"/>

  </g>

  <!-- ── Accent dot top-center of inner circle ── -->
  <circle cx="250" cy="148" r="3.5" fill="#00ffc8" opacity="0.7" filter="url(#glow)"/>
  <circle cx="250" cy="352" r="3.5" fill="#00ffc8" opacity="0.7" filter="url(#glow)"/>

  <!-- ── Small scan line at bottom of inner circle ── -->
  <line x1="210" y1="330" x2="290" y2="330" stroke="#00ffc8" stroke-width="1" opacity="0.25"/>
  <line x1="222" y1="337" x2="278" y2="337" stroke="#00ffc8" stroke-width="0.75" opacity="0.15"/>

  <!-- ── Version / label text (tiny mono) ── -->
  <text
    x="250" y="392"
    text-anchor="middle"
    font-family="monospace"
    font-size="11"
    letter-spacing="4"
    fill="#6868a0"
  >DEV.PORTFOLIO</text>

</svg>
